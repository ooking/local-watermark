<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title">图片加水印工具</title>
    <link rel="stylesheet" href="styles.css">
    <script src="i18n.js"></script>
</head>

<body>
    <div class="lang-selector">
        <select id="languageSelect" title="Select Language">
            <option value="zh-CN">简体中文</option>
            <option value="zh-TW">繁體中文</option>
            <option value="en">English</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
        </select>
    </div>
    <div class="container">
        <h1 data-i18n="title">图片加水印工具</h1>
        <p class="privacy-notice" data-i18n="privacyHint">图片不会上传，所有处理均在本地完成</p>

        <!-- 上传区域 -->
        <div class="upload-section">
            <input type="file" id="imageInput" accept="image/*" hidden>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📷</div>
                <p data-i18n="uploadHint1">点击或拖拽上传图片</p>
                <p class="upload-hint" data-i18n="uploadHint2">支持 JPG、PNG 格式</p>
            </div>
        </div>

        <!-- 编辑区域：双栏布局 -->
        <div class="editor-layout" id="editorLayout" style="display: none;">
            <!-- 控制面板 -->
            <div class="control-panel" id="controlPanel">
                <!-- 文案模板 -->
                <div class="control-group">
                    <h3 data-i18n="templateTitle">文案模板</h3>
                    <div class="template-buttons">
                        <button class="template-btn" data-template="copyright"
                            data-i18n="templateCopyright">版权声明</button>
                        <button class="template-btn" data-template="watermark"
                            data-i18n="templateWatermark">水印文字</button>
                        <button class="template-btn" data-template="confidential"
                            data-i18n="templateConfidential">机密文件</button>
                        <button class="template-btn" data-template="custom" data-i18n="templateCustom">自定义</button>
                    </div>
                </div>

                <!-- 水印文字输入 -->
                <div class="control-group">
                    <label for="watermarkText" data-i18n="watermarkLabel">水印文字：</label>
                    <input type="text" id="watermarkText" data-i18n-placeholder="watermarkPlaceholder"
                        placeholder="请输入水印文字">
                </div>

                <!-- 字体设置 -->
                <div class="control-group">
                    <h3 data-i18n="fontSettingTitle">字体设置</h3>
                    <div class="setting-row">
                        <label for="fontFamily" data-i18n="fontLabel">字体：</label>
                        <select id="fontFamily">
                            <option value="Microsoft YaHei" data-i18n="fontMSYH">微软雅黑</option>
                            <option value="SimSun" data-i18n="fontSimSun">宋体</option>
                            <option value="SimHei" data-i18n="fontSimHei">黑体</option>
                            <option value="KaiTi" data-i18n="fontKaiTi">楷体</option>
                            <option value="Arial">Arial</option>
                            <option value="Verdana">Verdana</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <label for="fontSize" data-i18n="fontSizeLabel">字体大小：</label>
                        <input type="range" id="fontSize" min="12" max="200" value="70">
                        <span id="fontSizeValue">70px</span>
                    </div>
                    <div class="setting-row">
                        <label for="fontColor" data-i18n="fontColorLabel">字体颜色：</label>
                        <input type="color" id="fontColor" value="#ffffff">
                    </div>
                    <div class="setting-row">
                        <label for="opacity" data-i18n="opacityLabel">透明度：</label>
                        <input type="range" id="opacity" min="0" max="100" value="50">
                        <span id="opacityValue">50%</span>
                    </div>
                </div>

                <!-- 水印方向 -->
                <div class="control-group">
                    <h3 data-i18n="directionTitle">水印方向</h3>
                    <div class="direction-buttons">
                        <button class="direction-btn active" data-direction="horizontal"
                            data-i18n="dirHorizontal">水平</button>
                        <button class="direction-btn" data-direction="vertical" data-i18n="dirVertical">垂直</button>
                        <button class="direction-btn" data-direction="diagonal" data-i18n="dirDiagonal">对角线</button>
                    </div>
                </div>

                <!-- 间距设置 -->
                <div class="control-group">
                    <h3 data-i18n="spacingTitle">间距设置</h3>
                    <div class="setting-row">
                        <label for="spacing" data-i18n="spacingLabel">文字间距：</label>
                        <input type="range" id="spacing" min="10" max="100" value="30">
                        <span id="spacingValue">30px</span>
                    </div>
                </div>

                <!-- 导出设置 -->
                <div class="control-group">
                    <h3 data-i18n="exportTitle">导出设置</h3>
                    <div class="setting-row">
                        <label for="format" data-i18n="formatLabel">图片格式：</label>
                        <select id="format">
                            <option value="jpg">JPG</option>
                            <option value="png">PNG</option>
                        </select>
                    </div>
                    <div class="setting-row">
                        <label for="scale" data-i18n="scaleLabel">缩放比例：</label>
                        <input type="range" id="scale" min="10" max="200" value="100">
                        <span id="scaleValue">100%</span>
                    </div>
                </div>

                <!-- 操作按钮 -->
                <div class="action-buttons">
                    <button id="reuploadBtn" class="btn-secondary" data-i18n="btnReupload">重新上传</button>
                    <button id="downloadBtn" class="btn-primary" data-i18n="btnDownload">下载图片</button>
                    <button id="resetBtn" class="btn-secondary" data-i18n="btnReset">重置设置</button>
                </div>
            </div>

            <!-- 预览区域 -->
            <div class="preview-section" id="previewSection">
                <div class="preview-container">
                    <canvas id="previewCanvas"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
